# Jekyll Configuration for SSP SDK Documentation
title: SSP SDK Documentation
description: Official documentation for SSP SDK Android advertising SDK
remote_theme: pages-themes/dinky@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-github-metadata
  - jemoji
  - jekyll-relative-links

# Site settings
baseurl: "/ssp-sdk-android"
url: "https://ssp-sdk.github.io"

# Author info
author:
  name: SSP SDK Team
  email: support@ssp-sdk.com

# Collections
collections:
  docs:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      toc: true
      order: 1
  - scope:
      path: "privacy"
    values:
      layout: "default"
      order: 0

# Markdown config
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true

# Exclude unnecessary files
exclude:
  - Gemfile
  - Gemfile.lock
  - ".idea"
  - vendor
  - node_modules
  - _site
  - "*.md"
  - "!.github"
